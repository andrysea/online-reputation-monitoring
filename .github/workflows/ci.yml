name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Scarica il codice della repository dentro l'ambiente GitHub Actions.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura Python nell'ambiente della pipeline.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Installa le librerie necessarie per eseguire progetto e test.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Esegue i test automatici con pytest.
      - name: Run tests
        run: |
          python -m pytest